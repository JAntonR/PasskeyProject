<!-- login.html -->
<html>
<head><title>Login</title></head>
<body>
  <h1>Waiting for phone proximity...</h1>
  <script>
    const username = "user1";  // hardcoded or set from storage

    async function pollTrigger() {
      while (true) {
        let res = await fetch("https://316b2d2fcea6.ngrok-free.appp/trigger-auth");
        let data = await res.json();
        if (data.trigger) {
          console.log("Trigger received, starting auth...");
          await startAuth();
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    async function startAuth() {
      const options = await fetch("https://316b2d2fcea6.ngrok-free.app/login-challenge", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username})
      }).then(res => res.json());

      options.challenge = Uint8Array.from(atob(options.challenge), c => c.charCodeAt(0));
      options.allowCredentials = options.allowCredentials.map(cred => ({
        ...cred,
        id: Uint8Array.from(atob(cred.id), c => c.charCodeAt(0))
      }));

      const credential = await navigator.credentials.get({publicKey: options});
      const result = await fetch("https://316b2d2fcea6.ngrok-free.app/verify-assertion", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, credential})
      });

      if ((await result.json()).unlock) alert("🔓 Locker Unlocked!");
    }

    pollTrigger();
  </script>
</body>
</html>
