<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passkey Login</title>
</head>
<body>
  <h1>Proximity Login</h1>
  <p id="status">Waiting for locker signal...</p>

  <script>
    async function pollForTrigger() {
      while (true) {
        try {
          const res = await fetch("https://d7aa38fba230.ngrok-free.app/trigger-auth");
          const data = await res.json();
          if (data.trigger === true) {
            document.getElementById("status").textContent = "Authenticating...";
            await beginAuthentication();
            break;
          } else {
            document.getElementById("status").textContent = "Waiting for locker signal...";
          }
        } catch (e) {
          document.getElementById("status").textContent = "Error contacting server.";
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    async function beginAuthentication() {
      const res = await fetch("https://d7aa38fba230.ngrok-free.app/login-challenge");
      const options = await res.json();

      options.challenge = base64urlToBuffer(options.challenge);
      options.allowCredentials = options.allowCredentials.map(cred => ({
        ...cred,
        id: base64urlToBuffer(cred.id)
      }));

      const assertion = await navigator.credentials.get({ publicKey: options });

      const credential = {
        id: assertion.id,
        rawId: bufferToBase64url(assertion.rawId),
        type: assertion.type,
        response: {
          authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
          clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
          signature: bufferToBase64url(assertion.response.signature),
          userHandle: assertion.response.userHandle ? bufferToBase64url(assertion.response.userHandle) : null
        }
      };

      const verify = await fetch("https://d7aa38fba230.ngrok-free.app/verify-assertion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential })
      });

      const result = await verify.json();
      document.getElementById("status").textContent = result.status || "Login complete.";
    }

    function base64urlToBuffer(base64url) {
      const pad = '='.repeat((4 - base64url.length % 4) % 4);
      const base64 = (base64url + pad).replace(/-/g, '+').replace(/_/g, '/');
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    }

    function bufferToBase64url(buffer) {
      const bytes = new Uint8Array(buffer);
      const bin = Array.from(bytes, b => String.fromCharCode(b)).join('');
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    pollForTrigger();
  </script>
</body>
</html>
