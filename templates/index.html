<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Locker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1>Phone Bluetooth Distance</h1>
  <button onclick="registerPasskey()">Register Passkey</button>
  <button onclick="scan()">Scan for Devices</button>
  <pre id="output">Waiting for device...</pre>

<script>
  const targetName = "BBNo$"; // The name of the target device to look for

  // Estimate distance from RSSI
  // This function estimates the distance based on the RSSI value.
  // It uses a simple formula where the txPower is set to -60 dBm.
  function estimateDistance(rssi) {
    if (rssi === null || rssi === undefined) return NaN;
    const txPower = -60;
    return parseFloat((10 ** ((txPower - rssi) / 20)).toFixed(2));
  }

  // Register a passkey using WebAuthn
  // This function creates a new passkey credential and stores it in localStorage.
  // It uses the WebAuthn API to create a public key credential.
  async function registerPasskey() {
    try {
      const publicKey = {
        challenge: new Uint8Array(32),
        rp: { name: "Demo App" },
        user: {
          id: new Uint8Array(16),
          name: "demo-user",
          displayName: "Demo User"
        },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
        timeout: 60000,
        attestation: "none",
        authenticatorSelection: {
          userVerification: "required",
          authenticatorAttachment: "platform"
        }
      };

      // Create the credential using the WebAuthn API
      // This will prompt the user to register their passkey.
      const credential = await navigator.credentials.create({ publicKey });
      const rawId = credential.rawId;
      const idBase64 = btoa(String.fromCharCode(...new Uint8Array(rawId)));
      localStorage.setItem("credentialId", idBase64);

      alert("Passkey registered and saved!");
    } catch (err) {
      alert("Passkey registration failed: " + err.message);
    }
  }

  // Authenticate using stored passkey
  // This function retrieves the stored passkey and uses it to authenticate the user.
  // It uses the WebAuthn API to get an assertion for the stored credential.
  async function authenticate() {
    try {
      const storedId = localStorage.getItem("credentialId");
      if (!storedId) {
        alert("No passkey found. Please register one first.");
        return;
      }

      const publicKey = {
        challenge: new Uint8Array(32),
        allowCredentials: [{
          id: Uint8Array.from(atob(storedId), c => c.charCodeAt(0)),
          type: 'public-key',
          transports: ['internal']
        }],
        timeout: 60000,
        userVerification: 'required'
      };

      const assertion = await navigator.credentials.get({ publicKey });
      document.getElementById("output").textContent = "✅ Face ID authentication successful!";
    } catch (err) {
      document.getElementById("output").textContent = "❌ Authentication failed: " + err.message;
    }
  }

  // Manual BLE scan trigger (optional)
  // This function can be called to manually trigger a scan for BLE devices.
  // It fetches the list of devices from the Flask server and checks for the target device
  async function scan() {
    const res = await fetch('/scan');
    const devices = await res.json();

    const targetDevice = devices.find(device => device.name === targetName);

    // If the target device is found, display its details and initiate Face ID authentication
    // If the target device is not found, display a message indicating that it was not found
    let output = "";
    if (targetDevice) {
      const name = targetDevice.name || "Unknown";
      const address = targetDevice.address;
      const rssi = targetDevice.rssi;
      const distance = estimateDistance(rssi);

      output = `Target Device Found:
Name: ${name}
Address: ${address}
RSSI: ${rssi !== null ? rssi + " dBm" : "Unknown"}
Estimated Distance: ${!isNaN(distance) ? distance + " meters" : "Unknown"}`;

// If the estimated distance is less than or equal to 5 meters, initiate Face ID authentication
      if (!isNaN(distance) && distance <= 5) {
        output += "\n\n📲 Initiating Face ID Authentication...";
        document.getElementById("output").textContent = output;
        authenticate();
        return;
      }
    } else {
      output = "❌ Target device not found."; // If the target device is not found, display a message
    }

    document.getElementById("output").textContent = output; // Display the output in the pre element
  }

  // Automatically poll for BLE proximity trigger from Flask server
  // This function checks the server every 6 seconds to see if the target device is nearby.
  // If the device is detected, it triggers Face ID authentication.
  setInterval(async () => {
    try {
      const res = await fetch("/trigger-auth");
      const { trigger } = await res.json();

      if (trigger) {
        document.getElementById("output").textContent = "📶 BLE device detected nearby. Triggering Face ID...";
        authenticate();
      }
    } catch (err) {
      console.error("Error polling /trigger-auth:", err);
    }
  }, 6000); // Poll every 10 ish second
</script>
</body>
</html>
