<!DOCTYPE html>
<html>
<head>
  <title>Bluetooth Distance</title>
</head>
<body>
  <h1>Phone Bluetooth Distance</h1>
  <pre id="output"></pre>

  <script>
    const targetName = "BBNo$";

    // Function to estimate distance based on RSSI
    // This is a fairly okay approximation, but real-world conditions due to disturbances
    // can affect accuracy significantly.
    // The txPower value should be adjusted based on the specific device and environment.
    function estimateDistance(rssi) {
      if (rssi === null || rssi === undefined) return NaN;
      const txPower = -59; // Rougly the RSSI at 1 meter
      return parseFloat((10 ** ((txPower - rssi) / 20)).toFixed(2));
    }

    // Function to scan for devices and check for the target device
    async function scan() {
      const res = await fetch('/scan');
      const devices = await res.json();

      const targetDevice = devices.find(device => device.name === targetName);

      let output = "";
      if (targetDevice) {
        const name = targetDevice.name || "Unknown";
        const address = targetDevice.address;
        const rssi = targetDevice.rssi;
        const distance = estimateDistance(rssi);

        output = `Target Device Found:
Name: ${name}
Address: ${address}
RSSI: ${rssi !== null ? rssi + " dBm" : "Unknown"}
Estimated Distance: ${!isNaN(distance) ? distance + " meters" : "Unknown"}`;

        // Change the distance threshold as needed. 0.1 meters is used because I wanted to test without leaving my desk.
        // If the device is within 0.1 meters, initiate Windows Hello login.
        if (distance <= 0.1) {
          output += `\n\n📲 Initiating Windows Hello Login...`;
          authenticate();
        } else {
          output += `\nToo far away for login.`;
        }
      } else {
        output = "Target device not found.";
      }

      document.getElementById("output").textContent = output;
    }

    // Function to authenticate using Windows Hello
    // This function only works on local host
    // and requires a compatible browser and device.
    // It uses the Web Authentication API to create a passkey.
    async function authenticate() {
      try {
        const res = await fetch("/login-challenge");
        const { publicKey } = await res.json();

        publicKey.challenge = hexToUint8Array(publicKey.challenge);
        publicKey.allowCredentials.forEach(cred => {
          cred.id = base64ToUint8Array(cred.id);
        });

        const assertion = await navigator.credentials.get({ publicKey });

        const id = arrayBufferToBase64(assertion.rawId);
        const authRes = await fetch("/verify-assertion", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id })
        });

        if (authRes.ok) {
          alert("Authenticated with Windows Hello!");
        } else {
          alert("Authentication failed.");
        }
      } catch (err) {
        console.error("Authentication error:", err);
        alert("Login failed. See console for details.");
      }
    }

    // Helper functions to convert between formats
    // These functions are used to convert the challenge and credential IDs
    // from base64 and hex formats to Uint8Array, which is required by the Web
    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    // API.
    // Converts a hex string to a Uint8Array.
    // This is used to convert the challenge from hex to a format that can be used by the Web Authentication API.
    function hexToUint8Array(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
      }
      return bytes;
    }

    // Converts an ArrayBuffer to a base64 string.
    // This is used to convert the rawId from the assertion to a format that can be
    // sent to the server.
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    let scanIntervalId = null;

    // Periodically scan for devices every 10 seconds
    // and stop scanning when the target device is found and close enough.
    async function periodicScan() {
      await scan();
      const output = document.getElementById("output").textContent;

      // Continue scanning if device not found OR device too far
      if (
        output.includes("Target device not found.") ||
        output.includes("Too far away for login.")
      ) {
        // keep scanning, do nothing
      } else {
        // Device found AND close enough stop scanning
        clearInterval(scanIntervalId);
        scanIntervalId = null;
      }
    }

    scanIntervalId = setInterval(periodicScan, 10000);
    periodicScan();
  </script>
</body>
</html>
