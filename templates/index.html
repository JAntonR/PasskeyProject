<!DOCTYPE html>
<html>
<head>
  <title>Locker BLE Scanner</title>
</head>
<body>
  <h1>Locker is scanning for phone...</h1>
  <pre id="output"></pre>

  <script>
    async function estimateDistance(rssi) {
      const txPower = -59;
      return parseFloat((10 ** ((txPower - rssi) / 20)).toFixed(2));
    }

    async function scan() {
      const res = await fetch('/scan');
      const devices = await res.json();
      const target = devices.find(d => d.name === "BBNo$");

      let output = "";
      if (target) {
        const rssi = target.rssi;
        const dist = await estimateDistance(rssi);
        output = `Found ${target.name} at RSSI ${rssi}, est. ${dist} meters`;
        if (dist <= 0.1) {
          output += "\n✅ In range - triggered Face ID on phone";
        } else {
          output += "\n📵 Too far - not triggering";
        }
      } else {
        output = "Target not found";
      }

      document.getElementById("output").textContent = output;
    }

    setInterval(scan, 5000);
    scan();
  </script>
</body>
</html>
