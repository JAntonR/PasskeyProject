<body>
  <h1>Phone Bluetooth Distance</h1>
  <button onclick="registerPasskey()">🔐 Register Passkey</button>
  <button onclick="scan()">📡 Scan for Devices</button>
  <pre id="output"></pre>

<script>
  const targetName = "BBNo$"; // Device name to look for

  function estimateDistance(rssi) {
    if (rssi === null || rssi === undefined) return NaN;
    const txPower = -59;
    return parseFloat((10 ** ((txPower - rssi) / 20)).toFixed(2));
  }

  async function registerPasskey() {
    try {
      const publicKey = {
        challenge: new Uint8Array(32), // Normally provided by the server
        rp: { name: "My Demo App" },
        user: {
          id: new Uint8Array(16),
          name: "demo-user",
          displayName: "Demo User"
        },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
        timeout: 60000,
        attestation: "none",
        authenticatorSelection: {
          userVerification: "required",
          authenticatorAttachment: "platform"  // Windows Hello = platform
        }
      };

      const credential = await navigator.credentials.create({ publicKey });

      // Store credential ID for later use
      const rawId = credential.rawId;
      const idBase64 = btoa(String.fromCharCode(...new Uint8Array(rawId)));
      localStorage.setItem("credentialId", idBase64);

      alert("✅ Passkey registered and saved!");
    } catch (err) {
      alert("❌ Passkey registration failed: " + err.message);
    }
  }

  async function authenticate() {
    try {
      const storedId = localStorage.getItem("credentialId");
      if (!storedId) {
        alert("⚠️ No passkey found. Please register one first.");
        return;
      }

      const publicKey = {
        challenge: new Uint8Array(32),
        allowCredentials: [{
          id: Uint8Array.from(atob(storedId), c => c.charCodeAt(0)),
          type: 'public-key',
          transports: ['internal']
        }],
        timeout: 60000,
        userVerification: 'required'
      };

      const assertion = await navigator.credentials.get({ publicKey });
      alert("✅ Windows Hello Authentication Successful");
    } catch (err) {
      alert("❌ Authentication failed: " + err.message);
    }
  }

  async function scan() {
    const res = await fetch('/scan');
    const devices = await res.json();

    const targetDevice = devices.find(device => device.name === targetName);

    let output = "";
    if (targetDevice) {
      const name = targetDevice.name || "Unknown";
      const address = targetDevice.address;
      const rssi = targetDevice.rssi;
      const distance = estimateDistance(rssi);

      output = `🎯 Target Device Found:
Name: ${name}
Address: ${address}
RSSI: ${rssi !== null ? rssi + " dBm" : "Unknown"}
Estimated Distance: ${!isNaN(distance) ? distance + " meters" : "Unknown"}`;

      if (!isNaN(distance) && distance <= 5) {
        output += "\n\n🟢 Initiating Windows Hello Authentication...";
        authenticate();
      }
    } else {
      output = "❌ Target device not found.";
    }

    document.getElementById("output").textContent = output;
  }
</script>
</body>
