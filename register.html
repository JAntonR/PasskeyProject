<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Passkey</title>
</head>
<body>
  <h1>Register Passkey</h1>
  <input id="username" type="email" placeholder="Enter your email" />
  <button onclick="startRegistration()">Register</button>
  <p id="status"></p>

  <script>
    async function startRegistration() {
      const username = document.getElementById("username").value;
      if (!username) return alert("Enter a username (email)");

      const res = await fetch("https://d7aa38fba230.ngrok-free.app/register-options", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });

      const options = await res.json();
      options.challenge = base64urlToBuffer(options.challenge);
      options.user.id = base64urlToBuffer(options.user.id);

      if (options.excludeCredentials) {
        options.excludeCredentials = options.excludeCredentials.map(c => ({
          ...c,
          id: base64urlToBuffer(c.id)
        }));
      }

      const cred = await navigator.credentials.create({ publicKey: options });

      const credential = {
        id: cred.id,
        rawId: bufferToBase64url(cred.rawId),
        type: cred.type,
        response: {
          attestationObject: bufferToBase64url(cred.response.attestationObject),
          clientDataJSON: bufferToBase64url(cred.response.clientDataJSON)
        }
      };

      const verify = await fetch("https://d7aa38fba230.ngrok-free.app/verify-registration", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, credential })
      });

      const result = await verify.json();
      document.getElementById("status").textContent = result.status || "Registration complete.";
    }

    function base64urlToBuffer(base64url) {
      const pad = '='.repeat((4 - base64url.length % 4) % 4);
      const base64 = (base64url + pad).replace(/-/g, '+').replace(/_/g, '/');
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    }

    function bufferToBase64url(buffer) {
      const bytes = new Uint8Array(buffer);
      const bin = Array.from(bytes, b => String.fromCharCode(b)).join('');
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
  </script>
</body>
</html>
